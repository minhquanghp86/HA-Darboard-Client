api:
  reboot_timeout: 0s
  homeassistant_services: true
 
ota:
  - platform: esphome

output:
  - id: backlight_output
    platform: ledc
    pin: GPIO23

light:
  - platform: monochromatic
    output: backlight_output
    name: LCD Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0
    on_turn_on:
      then:      
        - script.execute: inactivity_timer
    
        

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: True
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: True

display:
  - platform: mipi_dsi
    model: JC1060P470
    reset_pin: GPIO5
    update_interval: never
    id: main_display
  #  rotation: 0
    auto_clear_enabled: false
    hsync_pulse_width: 20



i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

touchscreen:
  - platform: gt911
    id: touchscreen_
    on_touch:
      then:

      - script.execute: inactivity_timer

    



audio_dac:
  - platform: es8311
    id: es8311_codec
    i2c_id: i2c_bus_a
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 44100
    use_mclk: True
    use_microphone: True
    mic_gain: 24DB

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12
    i2s_mclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: external_mic
    i2s_audio_id: i2s_output
    i2s_mode: primary
    adc_type: external
    i2s_din_pin: GPIO48
    sample_rate: 16000
    bits_per_channel: 16bit
    channel: stereo

speaker:
  - platform: i2s_audio
    i2s_audio_id: i2s_output
    id: speaker_id
    i2s_dout_pin: GPIO09
    dac_type: external
    sample_rate: 44100
    bits_per_sample: 16bit
    channel: left
    audio_dac: es8311_codec
    buffer_duration: 1000ms
    i2s_mode: primary
  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    num_channels: 1
    task_stack_in_psram: True
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input
  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input
  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Speaker Media Player"
    id: speaker_media_player_id
    task_stack_in_psram: True
    buffer_size: 1000000
    codec_support_enabled: True
    volume_initial: 70%
    volume_max: 70%
    announcement_pipeline:
        speaker: announcement_spk_resampling_input
        sample_rate: 44100
        num_channels: 1

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 5s


  - platform: adc
    pin: GPIO53
    id: raw_adc
    name: "Raw ADC"
    attenuation: auto
    internal: true
    # Tăng update_interval lên 2s và đồng bộ với battery_voltage/percent
    # raw_adc: 2s × window 10 = gửi mỗi 20s → phù hợp với update 5s (cuộn giá trị mới nhất)
    update_interval: 500ms
    accuracy_decimals: 4
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1   # Gửi mỗi lần để battery_voltage luôn có dữ liệu fresh

  - platform: template
    id: battery_voltage
    name: "Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      // Cầu phân áp 68k + 100k, offset hiệu chuẩn
      return id(raw_adc).state * 1.679f + 0.07f;

  - platform: template
    id: battery_percent
    name: "Battery Percent"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 30s   # Không cần cập nhật nhanh — pin thay đổi chậm
    lambda: |-
      const float v = id(battery_voltage).state;
      if (v < 3.00f) return 0.0f;
      if (v < 3.30f) return 5.0f;
      if (v < 3.50f) return 10.0f;
      if (v < 3.60f) return 20.0f;
      if (v < 3.70f) return 35.0f;
      if (v < 3.75f) return 45.0f;
      if (v < 3.80f) return 55.0f;
      if (v < 3.85f) return 65.0f;
      if (v < 3.90f) return 75.0f;
      if (v < 4.00f) return 85.0f;
      if (v < 4.10f) return 92.0f;
      if (v < 4.15f) return 97.0f;
      if (v < 4.20f) return 99.0f;
      return 100.0f;

    
