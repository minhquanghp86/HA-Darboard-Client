      type: local
      path: components/remote_webview_p4


remote_webview:
  id: rwv
#  device_id: matouch-e32p4mi71
  server: 192.168.10.2:8081
  url: http://192.168.10.2:8123/dashboard-mobile/2 
  full_frame_tile_count: 1
  max_bytes_per_msg: 262144 #256k
  jpeg_quality: 80
  min_frame_interval: 50
  tile_size: 64 # not less
 

logger:
  level: WARN
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200

psram:
  mode: hex
  speed: 200MHz

debug:

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

time:
  
  - platform: sntp
    id: sntp_time
    timezone: Asia/Ho_Chi_Minh
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - time.google.com
    on_time_sync:
      then:
        # Write time to RTC
        - rx8130.write_time:
            id: rx8130_time

  - platform: rx8130
    id: rx8130_time            

