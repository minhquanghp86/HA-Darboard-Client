#######################
preferences:
  flash_write_interval: 2s

esphome:
  name: esp32-p4-tab7
  friendly_name: 7inch-tab
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 600
    then:
    - lambda: |-
        int rotation = atoi(id(rotation_option).current_option().c_str());
        id(rwv).set_rotation(rotation);
    - lambda: |-
        auto url = id(rwv_default_url).state;
        if (url.size() > 0) {
          id(rwv).set_url(url);
        }
    - delay: 2s                          # ← chờ rwv connect xong
    - script.execute: inactivity_timer   # ← gọi sau
      

select:
  - platform: template
    name: "Xoay màn hình"
    id: rotation_option
    optimistic: true
    restore_value: true
    options:
      - "0"
      - "90"
      - "180"
      - "270"
    initial_option: "0"
    set_action:
      - lambda: |-
          int rotation = atoi(x.c_str());
          id(rwv).set_rotation(rotation);
          id(rwv).reconnect_ws();
      - delay: 1500ms
      - button.press: go_home


text:
  - platform: template
    id: rwv_default_url
    name: "URL mặc định"
    optimistic: true
    restore_value: true
    mode: TEXT
    min_length: 1
    


  - platform: template
    id: rwv_url
    name: "URL hiển thị"
    optimistic: true
    restore_value: false
    min_length: 1
    max_length: 255
    mode: TEXT
    set_action:
      - lambda: id(inactivity_timer).execute();
      - lambda: |-
          std::string base_url = x.c_str();
          std::string url = base_url;

          // 👉 chỉ append ?t= nếu là ảnh
          if (
            base_url.ends_with(".jpg")  ||
            base_url.ends_with(".jpeg") ||
            base_url.ends_with(".png")  ||
            base_url.ends_with(".webp")
          ) {
            url += "?t=";
            url += to_string(millis());
          }

          if (!id(rwv).open_url(url)) {
            id(rwv).set_url(url);
            ESP_LOGI("remote_webview", "URL queued (not connected): %s", url.c_str());
          } else {
            ESP_LOGI("remote_webview", "URL loaded: %s", url.c_str());
          }

number:
  - platform: template
    name: "Sleep time"
    id: sleep_time
    optimistic: true
    initial_value: 15
    restore_value: yes
    unit_of_measurement: "s"
    device_class: duration
    mode: box
    min_value: 5
    max_value: 600
    step: 1


script:
  
  - id: inactivity_timer
    mode: restart
    then:
      - if:
          condition:
            light.is_off: display_backlight
          then:
            - light.turn_on:
                id: display_backlight
            - delay: 0.5s
            - lambda: |-
                id(rwv).disable_touch(false);
      - if:
          condition:
            binary_sensor.is_on: video_playing
          then:
                
          else:
            - delay: !lambda 'return id(sleep_time).state * 1000;'                  
            - if:
                condition:
                  binary_sensor.is_off: video_playing
                then:
                  - light.turn_off:
                      id: display_backlight
                  - lambda: |-
                      id(rwv).disable_touch(true);

          
binary_sensor:
  - platform: template
    id: video_playing
    internal: false
    name: "Video Playing"
    lambda: |-
      return id(rwv).is_receiving_frames(3000);
    on_release:
      then:
        script.execute: inactivity_timer
          


button:
  - platform: template
    name: "Go Home"
    id: go_home
    icon: "mdi:home"
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(rwv_default_url).state.size() > 0;'
            then:
              - text.set:
                  id: rwv_url
                  value: !lambda 'return id(rwv_default_url).state;'

  - platform: restart 
    name: "Khởi động lại"
    id: restart_switch  

                  
          
safe_mode:


esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM_XIP_FROM_PSRAM: y
      CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT: y
      CONFIG_COMPILER_OPTIMIZATION_SIZE: n
      COMPILER_OPTIMIZATION_PERF: y # tối ưu tốc độ CPU
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_FREERTOS_UNICORE: n # đảm bảo dual-core hoạt động
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_360: y  # lock 360MHz

    advanced: 
      enable_idf_experimental_features: yes 
    components:
      - name: "espressif/esp_websocket_client"
        ref: 1.5.0
      - name: "bitbank2/jpegdec"
        source: https://github.com/SleepinDevil/jpegdec-esphome


#external_components:
#  - source: github://minhquanghp86/HA-Darboard-Client@esp32p4
#    refresh: 0s
#    components: [ remote_webview ]

external_components:
  - source: 
      type: local
      path: components/remote_webview_p4_rotation_2


remote_webview:
  id: rwv
  server: 192.168.10.2:8081
  url: http://192.168.10.2:8123/dashboard-mobile/3
  full_frame_tile_count: 1
  max_bytes_per_msg: 262144 #256k
  jpeg_quality: 80
  min_frame_interval: 50
  tile_size: 64 # not less
 

logger:
  level: WARN
  hardware_uart: USB_SERIAL_JTAG
  baud_rate: 115200

psram:
  mode: hex
  speed: 200MHz

debug:

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

time:
  
  - platform: sntp
    id: sntp_time
    timezone: Asia/Ho_Chi_Minh
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - time.google.com
    on_time_sync:
      then:
        # Write time to RTC
        - rx8130.write_time:
            id: rx8130_time

  - platform: rx8130
    id: rx8130_time            

wifi:
  ssid: 
  password: ""
  manual_ip:
    static_ip: 
    gateway: 
    subnet: 255.255.255.0
    dns1: 8.8.8.8
    dns2: 8.8.4.4

  ap:
    ssid: "REMOTE_WEBVIEW ESP32-P4"
    password: "12345678"


captive_portal:

