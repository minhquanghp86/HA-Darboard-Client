esphome:
  name: esp32-p4-tab7
  friendly_name: 7inch-tab
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then: 
      - script.execute: inactivity_timer
      


text:
  - platform: template
    id: rwv_url
    name: "URL"
    optimistic: true
    restore_value: false
    mode: TEXT
    min_length: 1
    set_action:
      - lambda: |-
          if (!id(rwv).open_url(std::string(x.c_str()))) {
            id(rwv).set_url(std::string(x.c_str()));
            ESP_LOGI("remote_webview", "URL queued (not connected): %s", x.c_str());
          }




script:
  - id: inactivity_timer
    mode: restart
    then:
      - if:
          condition:
            light.is_off: back_light
          then:
            - light.turn_on:
                id: back_light
            - delay: 0.5s
           # - lambda: |-
             #   id(rwv).disable_touch(false);
      - delay: 15s
      - light.turn_off:
          id: back_light
      #- lambda: |-
       #   id(rwv).disable_touch(true);
                

  
          
button:
  

  - platform: restart 
    name: "Khởi động lại"
    id: restart_switch  
                  
          
safe_mode:


esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM_XIP_FROM_PSRAM: y
      CONFIG_ESP_SYSTEM_PANIC_PRINT_REBOOT: y
      CONFIG_COMPILER_OPTIMIZATION_SIZE: n
      COMPILER_OPTIMIZATION_PERF: y # tối ưu tốc độ CPU
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_FREERTOS_UNICORE: n # đảm bảo dual-core hoạt động
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_360: y  # lock 360MHz

    advanced: 
      enable_idf_experimental_features: yes 
    components:
      - name: "espressif/esp_websocket_client"
        ref: 1.5.0
      - name: "bitbank2/jpegdec"
        source: https://github.com/SleepinDevil/jpegdec-esphome

